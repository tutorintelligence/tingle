name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Swift tests
        run: swift run tingle-tests
      - name: Device payload tests
        run: python3 tools/test_payload.py
      - name: Version-bump logic tests
        run: cd tools && python3 test_next_version.py
      - name: Payload copies in sync
        run: cmp device/tingle_main.py Sources/TingleCore/Resources/tingle_main.py
      - name: Bundle assembles
        run: ./scripts/bundle.sh
      - name: Bundled app finds its resources
        # Regression guard: SwiftPM's Bundle.module accessor crashed the
        # CI-built .app on Flash EP (resource bundle unfindable outside
        # the build machine). Move the .app away from the checkout so no
        # local .build fallback can mask a broken layout.
        run: |
          cp -R dist/tingle.app /tmp/tingle-check.app
          TINGLE_PAYLOAD_CHECK=1 /tmp/tingle-check.app/Contents/MacOS/tingle
