name: Auto-release
# On every push to main (a squash-merged PR), derive the next semantic
# version from the Conventional-Commit merge subject. If a release is
# warranted, build → (sign+notarize if secrets present) → tag → GitHub
# Release with the .app zip → bump the Homebrew cask (if tap token present).
#
# Self-contained on purpose: a tag pushed by GITHUB_TOKEN cannot trigger a
# separate workflow, so tagging and releasing live in one job.
#
# Optional secrets (unsigned local-style build until these exist):
#   MACOS_CERT_P12_BASE64, MACOS_CERT_PASSWORD  Developer ID signing
#   NOTARY_KEY, NOTARY_KEY_ID, NOTARY_ISSUER_ID  notarization (App Store
#     Connect API key — the team Apple ID is Microsoft-federated, so
#     app-specific passwords don't exist for it)
#   TAP_DEPLOY_KEY  SSH deploy key with write access to tutorintelligence/homebrew-tap
#   SPARKLE_ED_PRIVATE_KEY  signs update zips for the Sparkle appcast
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Version-logic self-test
        run: cd tools && python3 test_next_version.py

      - name: Compute next version
        id: ver
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          SUBJECT=$(git log -1 --pretty=%s)
          echo "latest=${LATEST:-none} subject=$SUBJECT"
          NEXT=$(python3 tools/next_version.py "$LATEST" "$SUBJECT")
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          if [ -z "$NEXT" ]; then echo "No release for this commit type."; fi

      - name: Tests
        if: steps.ver.outputs.next != ''
        run: |
          swift run tingle-tests
          python3 tools/test_payload.py
          cmp device/tingle_main.py Sources/TingleCore/Resources/tingle_main.py

      - name: Import signing certificate
        if: steps.ver.outputs.next != '' && env.CERT != ''
        env:
          CERT: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PW: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          echo "$CERT" | base64 --decode > cert.p12
          security create-keychain -p tmppass build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p tmppass build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PW" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k tmppass build.keychain

      - name: Build bundle (signed if cert present)
        if: steps.ver.outputs.next != ''
        env:
          CERT: ${{ secrets.MACOS_CERT_P12_BASE64 }}
        run: |
          VERSION="${{ steps.ver.outputs.next }}"; VERSION="${VERSION#v}"
          if [ -n "$CERT" ]; then
            VERSION="$VERSION" CODESIGN_IDENTITY="Developer ID Application" ./scripts/bundle.sh
          else
            VERSION="$VERSION" ./scripts/bundle.sh
          fi

      - name: Notarize and staple
        if: steps.ver.outputs.next != '' && env.NOTARY_KEY_ID != ''
        env:
          NOTARY_KEY: ${{ secrets.NOTARY_KEY }}
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          echo "$NOTARY_KEY" > /tmp/notary_key.p8
          ditto -c -k --keepParent dist/tingle.app dist/notarize.zip
          xcrun notarytool submit dist/notarize.zip --key /tmp/notary_key.p8 \
            --key-id "$NOTARY_KEY_ID" --issuer "$NOTARY_ISSUER_ID" --wait
          xcrun stapler staple dist/tingle.app
          rm /tmp/notary_key.p8

      - name: Package artifact
        if: steps.ver.outputs.next != ''
        run: |
          VERSION="${{ steps.ver.outputs.next }}"; VERSION="${VERSION#v}"
          ditto -c -k --keepParent dist/tingle.app "dist/tingle-$VERSION.zip"

      - name: Sparkle appcast (sign zip, publish to gh-pages)
        if: steps.ver.outputs.next != '' && env.SPARKLE_KEY != ''
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          NEXT="${{ steps.ver.outputs.next }}"; VERSION="${NEXT#v}"
          ZIP="dist/tingle-$VERSION.zip"
          curl -sL -o /tmp/sparkle.tar.xz https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz
          mkdir -p /tmp/sparkle && tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          SIG_LINE=$(echo "$SPARKLE_KEY" | /tmp/sparkle/bin/sign_update --ed-key-file - "$ZIP")
          DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          URL="https://github.com/tutorintelligence/tingle/releases/download/$NEXT/tingle-$VERSION.zip"
          # Newest-item-only appcast: Sparkle only needs the latest.
          cat > /tmp/appcast.xml <<APPCAST
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>tingle</title>
              <item>
                <title>$NEXT</title>
                <pubDate>$DATE</pubDate>
                <sparkle:version>$VERSION</sparkle:version>
                <sparkle:shortVersionString>$VERSION</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
                <enclosure url="$URL" $SIG_LINE type="application/octet-stream"/>
              </item>
            </channel>
          </rss>
          APPCAST
          sed -i '' 's/^          //' /tmp/appcast.xml
          git config user.name "tingle-release"
          git config user.email "noreply@tutorintelligence.com"
          if git fetch origin gh-pages 2>/dev/null; then
            git worktree add /tmp/pages origin/gh-pages
          else
            git worktree add --detach /tmp/pages
            cd /tmp/pages && git checkout --orphan gh-pages && git rm -rf . 2>/dev/null || true
            cd "$GITHUB_WORKSPACE"
          fi
          cp /tmp/appcast.xml /tmp/pages/appcast.xml
          cd /tmp/pages && git add appcast.xml && git commit -m "appcast $NEXT" && git push origin HEAD:gh-pages

      - name: Tag and GitHub Release
        if: steps.ver.outputs.next != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEXT="${{ steps.ver.outputs.next }}"; VERSION="${NEXT#v}"
          git tag "$NEXT"
          git push origin "$NEXT"
          gh release create "$NEXT" "dist/tingle-$VERSION.zip" \
            --title "$NEXT" --generate-notes

      - name: Bump Homebrew cask
        if: steps.ver.outputs.next != '' && env.TAP_DEPLOY_KEY != ''
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          NEXT="${{ steps.ver.outputs.next }}"; VERSION="${NEXT#v}"
          SHA=$(shasum -a 256 "dist/tingle-$VERSION.zip" | cut -d' ' -f1)
          mkdir -p ~/.ssh && ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          printf '%s\n' "$TAP_DEPLOY_KEY" > ~/.ssh/tap_key && chmod 600 ~/.ssh/tap_key
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_key -o IdentitiesOnly=yes"
          git clone git@github.com:tutorintelligence/homebrew-tap.git tap
          sed -E -i '' "s/version \"[^\"]+\"/version \"$VERSION\"/; s/sha256 \"[^\"]+\"/sha256 \"$SHA\"/" tap/Casks/tingle.rb
          cd tap && git -c user.name=tingle-release -c user.email=noreply@tutorintelligence.com commit -am "tingle $VERSION" && git push
